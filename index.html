<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COD Mobile — Tournament Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="header-inner">
        <div class="crosshair-icon">
          <svg viewBox="0 0 100 100" width="48" height="48">
            <circle cx="50" cy="50" r="30" stroke="#ff6a00" stroke-width="2" fill="none"/>
            <circle cx="50" cy="50" r="4" fill="#ff6a00"/>
            <line x1="50" y1="10" x2="50" y2="35" stroke="#ff6a00" stroke-width="2"/>
            <line x1="50" y1="65" x2="50" y2="90" stroke="#ff6a00" stroke-width="2"/>
            <line x1="10" y1="50" x2="35" y2="50" stroke="#ff6a00" stroke-width="2"/>
            <line x1="65" y1="50" x2="90" y2="50" stroke="#ff6a00" stroke-width="2"/>
          </svg>
        </div>
        <div class="header-text">
          <h1>CALL OF DUTY <span class="accent">MOBILE</span></h1>
          <p class="subtitle">ONE SHOT ONE KILL — TOURNAMENT MANAGER</p>
        </div>
      </div>
      <div class="header-stripe"></div>
    </header>

    <!-- SETUP SCREEN -->
    <div id="setup-screen" class="screen active">
      <div class="setup-grid">
        <section class="panel players-panel">
          <div class="panel-header">
            <h2><span class="label-tag">01</span> COMBATANTS</h2>
          </div>
          <div class="panel-body">
            <div class="add-player-row">
              <input type="text" id="player-input" placeholder="Enter operator name..." maxlength="24" autocomplete="off">
              <button id="add-player-btn" class="btn btn-primary" onclick="addPlayer()">
                <span>+ DEPLOY</span>
              </button>
            </div>
            <div id="player-list" class="player-list"></div>
            <div id="player-count" class="player-count"></div>
          </div>
        </section>

        <section class="panel mode-panel">
          <div class="panel-header">
            <h2><span class="label-tag">02</span> MISSION TYPE</h2>
          </div>
          <div class="panel-body">
            <div class="mode-options">
              <button class="mode-card" data-mode="knockout" onclick="selectMode('knockout')">
                <div class="mode-icon">⚔️</div>
                <h3>KNOCKOUT</h3>
                <p>Single elimination bracket. One loss and you're out. Includes 3rd place match.</p>
              </button>
              <button class="mode-card" data-mode="league" onclick="selectMode('league')">
                <div class="mode-icon">🏆</div>
                <h3>POINTS LEAGUE</h3>
                <p>Round-robin format. Every operator fights everyone. Points decide the champion.</p>
              </button>
            </div>
            <div id="mode-status" class="mode-status"></div>
          </div>
        </section>
      </div>

      <div class="start-section">
        <button id="start-btn" class="btn btn-start" onclick="startTournament()" disabled>
          <span>COMMENCE OPERATION</span>
        </button>
        <p id="start-error" class="start-error"></p>
      </div>
    </div>

    <!-- KNOCKOUT SCREEN -->
    <div id="knockout-screen" class="screen">
      <div class="tournament-header">
        <button class="btn btn-ghost" onclick="resetTournament()">← ABORT MISSION</button>
        <h2 id="knockout-title">KNOCKOUT TOURNAMENT</h2>
        <div id="knockout-round-info" class="round-info"></div>
      </div>
      <div id="bracket-container" class="bracket-container"></div>
      <div id="third-place-section" class="third-place-section hidden">
        <div class="panel-header"><h2>🥉 3RD PLACE MATCH</h2></div>
        <div id="third-place-match" class="third-place-match"></div>
      </div>
      <div class="tournament-actions">
        <button id="advance-btn" class="btn btn-primary hidden" onclick="advanceRound()">
          ADVANCE TO NEXT ROUND →
        </button>
        <button id="finish-btn" class="btn btn-start hidden" onclick="showResults()">
          VIEW FINAL RESULTS
        </button>
      </div>
    </div>

    <!-- LEAGUE SCREEN -->
    <div id="league-screen" class="screen">
      <div class="tournament-header">
        <button class="btn btn-ghost" onclick="resetTournament()">← ABORT MISSION</button>
        <h2>POINTS LEAGUE</h2>
        <div class="round-info">Round-Robin · Win = 3 pts</div>
      </div>
      <div class="league-layout">
        <section class="panel standings-panel">
          <div class="panel-header"><h2>STANDINGS</h2></div>
          <div id="standings-table" class="standings-table"></div>
        </section>
        <section class="panel matches-panel">
          <div class="panel-header"><h2>MATCHES</h2></div>
          <div id="league-matches" class="league-matches"></div>
        </section>
      </div>
      <div class="tournament-actions">
        <button id="league-finish-btn" class="btn btn-start hidden" onclick="showResults()">
          VIEW FINAL RESULTS
        </button>
      </div>
    </div>

    <!-- RESULTS SCREEN -->
    <div id="results-screen" class="screen">
      <div id="results-content" class="results-content"></div>
      <div class="tournament-actions">
        <button class="btn btn-start" onclick="resetTournament()">NEW OPERATION</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
